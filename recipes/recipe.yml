# Modified from BlueBuild template — exonomos
name: ucore
description: Custom uCore server OS
base-image: ghcr.io/ublue-os/ucore
image-version: stable

modules:
  - type: files
    files:
      - source: etc
        destination: /etc

  - type: rpm-ostree
    install:
      - neovim
      - dracut-sshd

  - type: systemd
    system:
      enabled:
        - cockpit.service
        - create-swapfile.service
        - var-swapfile.swap
      disabled:
        - zincati.service
      masked:
        - zincati.service
        - rpm-ostree-countme.timer

  - type: initramfs
